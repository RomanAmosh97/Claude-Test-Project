<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">&#128278; Bookmarks</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>

  <main class="contact-main">
    <div class="contact-card">
      <h1>Get in touch</h1>
      <p class="contact-sub">Fill out the form below and we'll get back to you as soon as possible.</p>

      <form id="contact-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your full name" required />
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="What's on your mind?" required></textarea>
          <span class="error-msg" id="message-error"></span>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>

      <div id="success-banner" class="success-banner" hidden>
        &#10003; Message sent! We'll be in touch soon.
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const banner = document.getElementById('success-banner');

    function showError(id, msg) {
      document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
      ['name-error', 'email-error', 'message-error'].forEach(id => {
        document.getElementById(id).textContent = '';
      });
    }

    function validate(name, email, message) {
      let valid = true;
      if (!name.trim()) {
        showError('name-error', 'Name is required.');
        valid = false;
      }
      if (!email.trim()) {
        showError('email-error', 'Email is required.');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('email-error', 'Enter a valid email address.');
        valid = false;
      }
      if (!message.trim()) {
        showError('message-error', 'Message is required.');
        valid = false;
      }
      return valid;
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      clearErrors();
      banner.hidden = true;

      const name    = document.getElementById('name').value;
      const email   = document.getElementById('email').value;
      const message = document.getElementById('message').value;

      if (!validate(name, email, message)) return;

      // Store submission in localStorage
      const submissions = JSON.parse(localStorage.getItem('contact-submissions') || '[]');
      submissions.push({ name, email, message, sentAt: new Date().toISOString() });
      localStorage.setItem('contact-submissions', JSON.stringify(submissions));

      form.reset();
      banner.hidden = false;
      banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  </script>

</body>
</html>
